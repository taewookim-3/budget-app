<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가계부">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>우리 가계부</title>
<style>
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface2: #f0efed;
  --text: #1a1a1a;
  --text2: #6b6b68;
  --text3: #a8a8a5;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --income: #0a7c5c;
  --income-bg: #e8f7f2;
  --expense: #c0392b;
  --expense-bg: #fdf0ef;
  --saving: #2563a8;
  --saving-bg: #eff5fd;
  --debt: #9c3a12;
  --debt-bg: #fdf3ee;
  --accent: #1a1a1a;
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110;
    --surface: #1c1c1a;
    --surface2: #252523;
    --text: #f0efed;
    --text2: #a8a8a5;
    --text3: #6b6b68;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --income-bg: #0a2e24;
    --expense-bg: #2e100e;
    --saving-bg: #0d1e35;
    --debt-bg: #2e1508;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
.app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* ── Header ── */
.header{
  background:var(--accent);
  padding: calc(var(--safe-top) + 14px) 20px 18px;
  flex-shrink:0;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.header-title{color:#fff;font-size:15px;font-weight:600;letter-spacing:0.02em}
.month-nav{display:flex;align-items:center;gap:14px}
.month-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.month-btn:active{background:rgba(255,255,255,0.3)}
.month-label{color:#fff;font-size:16px;font-weight:600;min-width:80px;text-align:center}
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.sum-card{background:rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px}
.sum-label{font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:3px;font-weight:500}
.sum-val{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sum-val.pos{color:#6ee7c3}
.sum-val.neg{color:#f9a8a8}

/* ── Chart bar ── */
.chart-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:11px;color:var(--text2);width:46px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:7px;background:var(--surface2);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width 0.35s ease}
.bar-amt{font-size:11px;color:var(--text2);width:62px;text-align:right;flex-shrink:0}

/* ── Tabs ── */
.tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 14px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* ── Entry list ── */
.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-bottom))}
.date-group{padding:8px 20px 4px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.04em;text-transform:uppercase}
.entry{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.entry:active{background:var(--surface2)}
.entry-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-sub{font-size:12px;color:var(--text3)}
.entry-right{text-align:right;flex-shrink:0}
.entry-amt{font-size:15px;font-weight:600}
.entry-del{background:none;border:none;color:var(--text3);padding:4px;font-size:18px;cursor:pointer;margin-left:6px}
.empty-state{text-align:center;padding:60px 40px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:15px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:24px;width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);z-index:50}
.fab:active{transform:scale(0.94)}

/* ── Bottom sheet modal ── */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100}
.sheet-bg.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 calc(20px + var(--safe-bottom));z-index:101;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.sheet-title{font-size:18px;font-weight:700}
.sheet-close{background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-scroll{padding:0 20px;max-height:65vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:0.02em}
.seg{display:grid;gap:6px;margin-bottom:4px}
.seg-5{grid-template-columns:repeat(5,1fr)}
.seg-btn{padding:9px 4px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text2);cursor:pointer;text-align:center;transition:all 0.15s}
.seg-btn.sel{color:#fff;border-color:transparent}
.seg-income.sel{background:var(--income)}
.seg-fixed.sel{background:var(--saving)}
.seg-variable.sel{background:#7c5c0a}
.seg-saving.sel{background:#4a2a8c}
.seg-debt.sel{background:var(--debt)}
.sub-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{padding:6px 12px;font-size:13px;border:1.5px solid var(--border2);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;font-weight:500;transition:all 0.15s}
.chip.sel{background:var(--text);color:var(--surface);border-color:var(--text)}
.form-input{width:100%;padding:13px 14px;font-size:16px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
.form-input:focus{border-color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn{margin:16px 20px 0;width:calc(100% - 40px);padding:16px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:0.02em}
.save-btn:active{opacity:0.85}

/* ── Lock screen ── */
.lock-screen{position:fixed;inset:0;background:var(--accent);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px calc(40px + var(--safe-bottom))}
.lock-screen.hidden{display:none}
.lock-logo{font-size:48px;margin-bottom:12px}
.lock-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
.lock-sub{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:48px;text-align:center}
.bio-btn{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);color:#fff;font-size:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-bottom:24px}
.bio-btn:active{background:rgba(255,255,255,0.25);transform:scale(0.94)}
.bio-label{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:40px}
.pin-fallback{display:none;flex-direction:column;align-items:center;width:100%}
.pin-fallback.show{display:flex}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.25);transition:background 0.15s}
.pin-dot.filled{background:#fff}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px}
.pin-key{height:64px;border-radius:16px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:22px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s}
.pin-key:active{background:rgba(255,255,255,0.25)}
.pin-key.del{font-size:18px}
.pin-key.empty{background:transparent;border:none;cursor:default}
.lock-err{color:#f9a8a8;font-size:13px;margin-top:12px;min-height:18px;text-align:center}
.bio-retry{background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;margin-top:8px;text-decoration:underline}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-title">💰 우리 가계부</div>
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="summary-row">
      <div class="sum-card"><div class="sum-label">수입</div><div class="sum-val pos" id="sIncome">₩0</div></div>
      <div class="sum-card"><div class="sum-label">지출</div><div class="sum-val neg" id="sExpense">₩0</div></div>
      <div class="sum-card"><div class="sum-label">저축</div><div class="sum-val" id="sSaving" style="color:#93c5fd">₩0</div></div>
      <div class="sum-card"><div class="sum-label">잔액</div><div class="sum-val" id="sBalance">₩0</div></div>
    </div>
  </div>

  <div class="chart-wrap" id="chartWrap"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="setTab('all',this)">전체</button>
    <button class="tab" onclick="setTab('income',this)">수입</button>
    <button class="tab" onclick="setTab('fixed',this)">고정</button>
    <button class="tab" onclick="setTab('variable',this)">변동</button>
    <button class="tab" onclick="setTab('saving',this)">저축</button>
    <button class="tab" onclick="setTab('debt',this)">부채</button>
  </div>

  <div class="list-wrap" id="listWrap"></div>
</div>

<button class="fab" onclick="openSheet()" aria-label="항목 추가">+</button>

<!-- Bottom Sheet -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">항목 추가</div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="form-scroll">
    <div class="form-group">
      <label class="form-label">대분류</label>
      <div class="seg seg-5" id="catSeg">
        <button class="seg-btn seg-income sel" onclick="selectCat('income',this)">수입</button>
        <button class="seg-btn seg-fixed" onclick="selectCat('fixed',this)">고정</button>
        <button class="seg-btn seg-variable" onclick="selectCat('variable',this)">변동</button>
        <button class="seg-btn seg-saving" onclick="selectCat('saving',this)">저축</button>
        <button class="seg-btn seg-debt" onclick="selectCat('debt',this)">부채</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">중분류</label>
      <div class="sub-chips" id="subChips"></div>
    </div>
    <div class="form-group">
      <label class="form-label">항목명</label>
      <input class="form-input" id="fName" type="text" placeholder="예: 월급, 마트 장보기" autocomplete="off">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">금액 (원)</label>
        <input class="form-input" id="fAmount" type="number" inputmode="numeric" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">날짜</label>
        <input class="form-input" id="fDate" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 (선택)</label>
      <input class="form-input" id="fMemo" type="text" placeholder="간단한 메모">
    </div>
  </div>
  <button class="save-btn" onclick="saveEntry()">저장하기</button>
</div>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-logo">💰</div>
  <div class="lock-title">우리 가계부</div>
  <div class="lock-sub" id="lockSub">지문 또는 얼굴로 잠금 해제</div>
  <button class="bio-btn" id="bioBtn" onclick="tryBiometric()" aria-label="생체 인증">🔒</button>
  <div class="bio-label" id="bioLabel">터치하여 인증</div>
  <button class="bio-retry" id="pinToggle" onclick="showPinFallback()">PIN으로 열기</button>

  <div class="pin-fallback" id="pinFallback">
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinInput('0')">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div class="lock-err" id="pinErr"></div>
  </div>
</div>

<script>
/* ── Auth ── */
const PIN_KEY='wg_pin_hash';
let pinBuffer='';
let bioAvailable=false;

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function initAuth(){
  const hasPin=!!localStorage.getItem(PIN_KEY);
  if(!hasPin){
    // First launch: ask to set PIN
    await setupPin();
    return;
  }
  // Check WebAuthn availability
  try{
    if(window.PublicKeyCredential&&await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()){
      bioAvailable=true;
      document.getElementById('lockSub').textContent='지문 또는 얼굴 인식으로 잠금 해제';
      document.getElementById('bioBtn').textContent='🔐';
      tryBiometric();
      return;
    }
  }catch(e){}
  // No biometrics — show PIN directly
  document.getElementById('lockSub').textContent='PIN을 입력해 주세요';
  document.getElementById('bioBtn').style.display='none';
  document.getElementById('bioLabel').style.display='none';
  document.getElementById('pinToggle').style.display='none';
  showPinFallback();
}

async function setupPin(){
  const pin1=prompt('처음 사용하시는군요!\n4자리 PIN을 설정해 주세요:');
  if(!pin1||pin1.length<4){alert('PIN은 4자리 이상이어야 합니다. 다시 시작해 주세요.');location.reload();return;}
  const pin2=prompt('PIN을 한 번 더 입력해 주세요:');
  if(pin1!==pin2){alert('PIN이 일치하지 않습니다. 다시 시작해 주세요.');location.reload();return;}
  const hash=await sha256(pin1);
  localStorage.setItem(PIN_KEY,hash);
  unlock();
}

async function tryBiometric(){
  if(!bioAvailable){showPinFallback();return;}
  const btn=document.getElementById('bioBtn');
  btn.textContent='⏳';
  try{
    await navigator.credentials.get({
      publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        rpId:location.hostname||'localhost',
        userVerification:'required',
        timeout:30000
      }
    });
    unlock();
  }catch(e){
    // WebAuthn not registered yet → fall back to platform authenticator via subtle approach
    // Use a simpler approach: prompt device biometric via payment/conditional UI unavailable,
    // so we use the best available: just show PIN with a friendly message
    btn.textContent='🔒';
    document.getElementById('bioLabel').textContent='인증 실패 — PIN으로 열어 주세요';
    showPinFallback();
  }
}

function showPinFallback(){
  document.getElementById('pinFallback').classList.add('show');
  document.getElementById('pinToggle').style.display='none';
}

function pinInput(d){
  if(pinBuffer.length>=4)return;
  pinBuffer+=d;
  updateDots();
  if(pinBuffer.length===4)setTimeout(checkPin,120);
}

function pinDelete(){
  pinBuffer=pinBuffer.slice(0,-1);
  updateDots();
  document.getElementById('pinErr').textContent='';
}

function updateDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);
  }
}

async function checkPin(){
  const hash=await sha256(pinBuffer);
  const stored=localStorage.getItem(PIN_KEY);
  if(hash===stored){
    unlock();
  }else{
    document.getElementById('pinErr').textContent='PIN이 틀렸습니다. 다시 입력해 주세요.';
    pinBuffer='';
    updateDots();
  }
}

function unlock(){
  document.getElementById('lockScreen').classList.add('hidden');
}

// Lock when page goes to background
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    document.getElementById('lockScreen').classList.remove('hidden');
    pinBuffer='';updateDots();
    document.getElementById('pinErr').textContent='';
    if(bioAvailable)setTimeout(tryBiometric,400);
  }
});

initAuth();
</script>

<script>
const SUBS={
  income:['주수입','부수입','이자·배당','기타'],
  fixed:['주거비','통신비','보험료','구독료','대출이자','기타'],
  variable:['식비','외식·배달','교통','주유','쇼핑','경조사','의료','기타'],
  saving:['정기적금','예금','주식·펀드','청약','연금','기타'],
  debt:['신용대출','학자금','카드할부','기타']
};
const ICONS={income:'💵',fixed:'🏠',variable:'🛒',saving:'💙',debt:'💳'};
const COLORS={income:'var(--income)',fixed:'var(--saving)',variable:'#9c6c0a',saving:'#4a2a8c',debt:'var(--debt)'};
const AMTCOL={income:'var(--income)',fixed:'var(--saving)',variable:'var(--text)',saving:'var(--saving)',debt:'var(--expense)'};
const BGCOL={income:'var(--income-bg)',fixed:'var(--saving-bg)',variable:'#fdf6e8',saving:'#f0eeff',debt:'var(--debt-bg)'};

let curMonth=new Date().getMonth(),curYear=new Date().getFullYear(),curTab='all';
let selectedCat='income',selectedSub='주수입';
let entries=JSON.parse(localStorage.getItem('wg_entries')||'[]');

function save(){try{localStorage.setItem('wg_entries',JSON.stringify(entries))}catch(e){}}
function fmt(n){
  const abs=Math.abs(Math.round(n));
  if(abs>=100000000)return'₩'+(abs/100000000).toFixed(1)+'억';
  if(abs>=10000)return'₩'+(abs/10000).toFixed(1)+'만';
  return'₩'+abs.toLocaleString('ko-KR');
}
function fmtFull(n){return'₩'+Math.round(n).toLocaleString('ko-KR');}
function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
}
function monthEntries(){
  return entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===curMonth&&d.getFullYear()===curYear;});
}
function setTab(t,el){
  curTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function render(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('monthLabel').textContent=curYear+'년 '+months[curMonth];
  const me=monthEntries();
  const income=me.filter(e=>e.cat==='income').reduce((a,b)=>a+b.amount,0);
  const fixed=me.filter(e=>e.cat==='fixed').reduce((a,b)=>a+b.amount,0);
  const variable=me.filter(e=>e.cat==='variable').reduce((a,b)=>a+b.amount,0);
  const saving=me.filter(e=>e.cat==='saving').reduce((a,b)=>a+b.amount,0);
  const debt=me.filter(e=>e.cat==='debt').reduce((a,b)=>a+b.amount,0);
  const totalExp=fixed+variable+debt;
  const balance=income-totalExp-saving;
  document.getElementById('sIncome').textContent=fmt(income);
  document.getElementById('sExpense').textContent=fmt(totalExp);
  document.getElementById('sSaving').textContent=fmt(saving);
  const bEl=document.getElementById('sBalance');
  bEl.textContent=fmt(balance);
  bEl.style.color=balance>=0?'#6ee7c3':'#f9a8a8';

  const max=Math.max(income,fixed+variable+debt,saving,1);
  const bars=[
    ['수입',income,'#1D9E75'],
    ['고정',fixed,'#378ADD'],
    ['변동',variable,'#EF9F27'],
    ['저축',saving,'#7F77DD'],
    ['부채',debt,'#E24B4A']
  ];
  document.getElementById('chartWrap').innerHTML=bars.map(([l,v,c])=>
    `<div class="bar-row"><div class="bar-lbl">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${c}"></div></div><div class="bar-amt">${fmt(v)}</div></div>`
  ).join('');

  renderList();
}

function renderList(){
  const me=monthEntries();
  const filtered=(curTab==='all'?me:me.filter(e=>e.cat===curTab)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const wrap=document.getElementById('listWrap');
  if(!filtered.length){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">아직 항목이 없어요<br>+ 버튼으로 추가해 보세요</div></div>';
    return;
  }
  let html='',lastDate='';
  filtered.forEach(e=>{
    if(e.date!==lastDate){
      const d=new Date(e.date+'T00:00:00');
      const days=['일','월','화','수','목','금','토'];
      html+=`<div class="date-group">${e.date.slice(5).replace('-','/')} (${days[d.getDay()]})</div>`;
      lastDate=e.date;
    }
    const neg=e.cat!=='income';
    html+=`<div class="entry">
      <div class="entry-icon" style="background:${BGCOL[e.cat]}">${ICONS[e.cat]}</div>
      <div class="entry-body">
        <div class="entry-name">${e.name}</div>
        <div class="entry-sub">${e.sub}${e.memo?' · '+e.memo:''}</div>
      </div>
      <div class="entry-right">
        <div class="entry-amt" style="color:${AMTCOL[e.cat]}">${neg?'-':'+'} ${fmtFull(e.amount)}</div>
      </div>
      <button class="entry-del" onclick="delEntry('${e.id}')" aria-label="삭제">×</button>
    </div>`;
  });
  wrap.innerHTML=html;
}

function delEntry(id){
  if(!confirm('이 항목을 삭제할까요?'))return;
  entries=entries.filter(e=>e.id!==id);
  save();render();
}

function openSheet(){
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('fName').value='';
  document.getElementById('fAmount').value='';
  document.getElementById('fMemo').value='';
  selectCat('income',document.querySelector('.seg-income'));
  document.getElementById('sheetBg').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheetBg').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function selectCat(cat,el){
  selectedCat=cat;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  selectedSub=SUBS[cat][0];
  renderSubChips();
}

function renderSubChips(){
  document.getElementById('subChips').innerHTML=SUBS[selectedCat].map(s=>
    `<button class="chip${s===selectedSub?' sel':''}" onclick="selectSub('${s}',this)">${s}</button>`
  ).join('');
}

function selectSub(s,el){
  selectedSub=s;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function saveEntry(){
  const name=document.getElementById('fName').value.trim();
  const amount=parseFloat(document.getElementById('fAmount').value);
  const date=document.getElementById('fDate').value;
  if(!name){alert('항목명을 입력해 주세요.');return;}
  if(!amount||amount<=0){alert('금액을 입력해 주세요.');return;}
  if(!date){alert('날짜를 선택해 주세요.');return;}
  entries.push({id:Date.now()+'_'+Math.random().toString(36).slice(2),cat:selectedCat,sub:selectedSub,name,amount,date,memo:document.getElementById('fMemo').value.trim()});
  save();closeSheet();render();
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

renderSubChips();
render();
</script>
</body>
</html>

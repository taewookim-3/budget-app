<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="태우♡소헌">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>태우♡소헌 가계부</title>
<style>
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f0efed;
  --text:#1a1a1a;--text2:#6b6b68;--text3:#a8a8a5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --income:#0a7c5c;--income-bg:#e8f7f2;
  --expense:#c0392b;--expense-bg:#fdf0ef;
  --saving:#2563a8;--saving-bg:#eff5fd;
  --debt:#9c3a12;--debt-bg:#fdf3ee;
  --accent:#1a1a1a;--radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1c1c1a;--surface2:#252523;
  --text:#f0efed;--text2:#a8a8a5;--text3:#6b6b68;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --income-bg:#0a2e24;--expense-bg:#2e100e;--saving-bg:#0d1e35;--debt-bg:#2e1508;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  font-size:16px;-webkit-font-smoothing:antialiased}
.app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* Header */
.header{background:var(--accent);padding:calc(var(--safe-top) + 14px) 20px 18px;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.header-title{color:#fff;font-size:15px;font-weight:600;letter-spacing:.02em}
.month-nav{display:flex;align-items:center;gap:14px}
.month-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;
  border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;-webkit-appearance:none}
.month-btn:active{background:rgba(255,255,255,.3)}
.month-label{color:#fff;font-size:16px;font-weight:600;min-width:80px;text-align:center}
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.sum-card{background:rgba(255,255,255,.1);border-radius:12px;padding:10px 10px}
.sum-label{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:3px;font-weight:500}
.sum-val{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sum-val.pos{color:#6ee7c3}.sum-val.neg{color:#f9a8a8}

/* 다가오는 급여 배너 */
.salary-banner{background:rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.1);
  padding:8px 20px;display:flex;gap:12px;flex-wrap:wrap}
.salary-item{font-size:12px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:5px}
.salary-item .dot{width:6px;height:6px;border-radius:50%;background:#6ee7c3;flex-shrink:0}
.salary-item.past .dot{background:rgba(255,255,255,.3)}
.salary-item.past{color:rgba(255,255,255,.4)}

/* Chart */
.chart-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:11px;color:var(--text2);width:44px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:7px;background:var(--surface2);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width .35s ease}
.bar-amt{font-size:11px;color:var(--text2);width:64px;text-align:right;flex-shrink:0}

/* Budget progress */
.budget-section{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;flex-shrink:0}
.budget-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.budget-lbl{font-size:11px;color:var(--text2);width:44px;text-align:right;flex-shrink:0}
.budget-track{flex:1;height:5px;background:var(--surface2);border-radius:20px;overflow:hidden}
.budget-fill{height:100%;border-radius:20px;transition:width .35s}
.budget-pct{font-size:11px;width:36px;text-align:right;flex-shrink:0;font-weight:600}

/* Tabs */
.tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 13px;font-size:13px;font-weight:500;color:var(--text3);
  border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* List */
.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-bottom))}
.date-group{padding:8px 20px 3px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.04em}
.entry{display:flex;align-items:center;gap:12px;padding:11px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.entry:active{background:var(--surface2)}
.entry-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-sub{font-size:12px;color:var(--text3)}
.entry-right{text-align:right;flex-shrink:0}
.entry-amt{font-size:14px;font-weight:600}
.entry-del{background:none;border:none;color:var(--text3);padding:4px;font-size:18px;cursor:pointer;margin-left:4px}
.empty-state{text-align:center;padding:50px 40px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-msg{font-size:14px;line-height:1.6}

/* FAB */
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:56px;height:56px;
  border-radius:50%;background:var(--accent);color:#fff;font-size:26px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:50}
.fab:active{transform:scale(.94)}

/* Bottom sheet */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100}
.sheet-bg.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;
  background:var(--surface);border-radius:24px 24px 0 0;
  padding:0 0 calc(20px + var(--safe-bottom));z-index:101;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.sheet-title{font-size:18px;font-weight:700}
.sheet-close{background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;
  border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-scroll{padding:0 20px;max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:.02em}
.seg{display:grid;gap:5px}.seg-5{grid-template-columns:repeat(5,1fr)}
.seg-btn{padding:8px 4px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);
  border-radius:var(--radius-sm);background:var(--surface);color:var(--text2);cursor:pointer;text-align:center}
.seg-btn.sel{color:#fff;border-color:transparent}
.seg-income.sel{background:var(--income)}.seg-fixed.sel{background:var(--saving)}
.seg-variable.sel{background:#7c5c0a}.seg-saving.sel{background:#4a2a8c}.seg-debt.sel{background:var(--debt)}
.sub-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.chip{padding:5px 11px;font-size:13px;border:1.5px solid var(--border2);border-radius:20px;
  background:var(--surface);color:var(--text2);cursor:pointer;font-weight:500}
.chip.sel{background:var(--text);color:var(--surface);border-color:var(--text)}
.form-input{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid var(--border2);
  border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;
  -webkit-appearance:none;appearance:none}
.form-input:focus{border-color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn{margin:14px 20px 0;width:calc(100% - 40px);padding:15px;background:var(--accent);
  color:#fff;font-size:16px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer}
.save-btn:active{opacity:.85}

/* 예산 설정 시트 */
.budget-set-btn{background:none;border:none;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;padding:2px 4px;text-decoration:underline}

/* Lock screen */
.lock-screen{position:fixed;inset:0;background:var(--accent);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px calc(40px + var(--safe-bottom))}
.lock-screen.hidden{display:none}
.lock-logo{font-size:48px;margin-bottom:12px}
.lock-title{color:#fff;font-size:22px;font-weight:700;margin-bottom:6px}
.lock-sub{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:36px;text-align:center}
.pin-dots{display:flex;gap:16px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .12s}
.pin-dot.filled{background:#fff}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:252px}
.pin-key{height:66px;border-radius:16px;background:rgba(255,255,255,.1);border:none;
  color:#fff;font-size:22px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .1s;
  -webkit-appearance:none;user-select:none;-webkit-user-select:none}
.pin-key:active{background:rgba(255,255,255,.28)}
.pin-key.empty{background:transparent!important;cursor:default}
.lock-err{color:#f9a8a8;font-size:13px;margin-top:14px;min-height:18px;text-align:center}
.pin-setup-hint{color:rgba(255,255,255,.4);font-size:12px;margin-top:8px;text-align:center}

/* 예산 설정 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;
  align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:20px;padding:24px 20px;width:calc(100% - 40px);max-width:360px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:13px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer}
.modal-cancel{background:var(--surface2);color:var(--text2)}
.modal-save{background:var(--accent);color:#fff}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-title">💑 태우♡소헌</div>
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="summary-row">
      <div class="sum-card"><div class="sum-label">수입</div><div class="sum-val pos" id="sIncome">₩0</div></div>
      <div class="sum-card"><div class="sum-label">지출</div><div class="sum-val neg" id="sExpense">₩0</div></div>
      <div class="sum-card"><div class="sum-label">저축</div><div class="sum-val" id="sSaving" style="color:#93c5fd">₩0</div></div>
      <div class="sum-card"><div class="sum-label">잔액</div><div class="sum-val" id="sBalance">₩0</div></div>
    </div>
    <div class="salary-banner" id="salaryBanner"></div>
  </div>
  <div class="chart-wrap" id="chartWrap"></div>
  <div class="budget-section" id="budgetSection"></div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('all',this)">전체</button>
    <button class="tab" onclick="setTab('income',this)">수입</button>
    <button class="tab" onclick="setTab('fixed',this)">고정</button>
    <button class="tab" onclick="setTab('variable',this)">변동</button>
    <button class="tab" onclick="setTab('saving',this)">저축</button>
    <button class="tab" onclick="setTab('debt',this)">부채</button>
  </div>
  <div class="list-wrap" id="listWrap"></div>
</div>

<button class="fab" onclick="openSheet()">+</button>

<!-- 항목 추가 시트 -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">항목 추가</div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="form-scroll">
    <div class="form-group">
      <label class="form-label">대분류</label>
      <div class="seg seg-5">
        <button class="seg-btn seg-income sel" onclick="selectCat('income',this)">수입</button>
        <button class="seg-btn seg-fixed" onclick="selectCat('fixed',this)">고정</button>
        <button class="seg-btn seg-variable" onclick="selectCat('variable',this)">변동</button>
        <button class="seg-btn seg-saving" onclick="selectCat('saving',this)">저축</button>
        <button class="seg-btn seg-debt" onclick="selectCat('debt',this)">부채</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">중분류</label><div class="sub-chips" id="subChips"></div></div>
    <div class="form-group"><label class="form-label">항목명</label><input class="form-input" id="fName" type="text" placeholder="예: 마트 장보기" autocomplete="off"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">금액 (원)</label><input class="form-input" id="fAmount" type="number" inputmode="numeric" placeholder="0" min="0"></div>
      <div class="form-group"><label class="form-label">날짜</label><input class="form-input" id="fDate" type="date"></div>
    </div>
    <div class="form-group"><label class="form-label">메모 (선택)</label><input class="form-input" id="fMemo" type="text" placeholder="간단한 메모"></div>
  </div>
  <button class="save-btn" onclick="saveEntry()">저장하기</button>
</div>

<!-- 예산 설정 모달 -->
<div class="modal-bg" id="budgetModal">
  <div class="modal">
    <div class="modal-title">📊 월 예산 설정</div>
    <div class="modal-field"><label class="modal-label">변동 지출 예산 (원)</label><input class="form-input" id="bVariable" type="number" inputmode="numeric" placeholder="예: 800000"></div>
    <div class="modal-field"><label class="modal-label">저축 목표 (원)</label><input class="form-input" id="bSaving" type="number" inputmode="numeric" placeholder="예: 500000"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="closeBudgetModal()">취소</button>
      <button class="modal-btn modal-save" onclick="saveBudget()">저장</button>
    </div>
  </div>
</div>

<!-- 잠금 화면 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-logo">💑</div>
  <div class="lock-title">태우♡소헌 가계부</div>
  <div class="lock-sub" id="lockSub">PIN을 입력해 주세요</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-key" onclick="pinInput('1')">1</button>
    <button class="pin-key" onclick="pinInput('2')">2</button>
    <button class="pin-key" onclick="pinInput('3')">3</button>
    <button class="pin-key" onclick="pinInput('4')">4</button>
    <button class="pin-key" onclick="pinInput('5')">5</button>
    <button class="pin-key" onclick="pinInput('6')">6</button>
    <button class="pin-key" onclick="pinInput('7')">7</button>
    <button class="pin-key" onclick="pinInput('8')">8</button>
    <button class="pin-key" onclick="pinInput('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinInput('0')">0</button>
    <button class="pin-key" onclick="pinDelete()">⌫</button>
  </div>
  <div class="lock-err" id="pinErr"></div>
  <div class="pin-setup-hint" id="pinHint"></div>
</div>

<script>
// ── 공휴일 (2025~2027) ──
const HOLIDAYS = new Set([
  '2025-01-01','2025-01-27','2025-01-28','2025-01-29','2025-01-30',
  '2025-03-01','2025-05-05','2025-05-06','2025-06-06','2025-08-15',
  '2025-10-03','2025-10-05','2025-10-06','2025-10-07','2025-10-08','2025-12-25',
  '2026-01-01','2026-02-16','2026-02-17','2026-02-18',
  '2026-03-01','2026-05-05','2026-06-06','2026-08-15',
  '2026-10-03','2026-12-25',
  '2027-01-01','2027-01-26','2027-01-27','2027-01-28',
  '2027-03-01','2027-05-05','2027-06-06','2027-08-15','2027-10-03','2027-12-25'
]);

function dateStr(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}

// 공휴일·주말이면 전날로 당기기
function getPayDate(year, month, baseDay){
  // 말일 초과 방지
  const daysInMonth = new Date(year, month, 0).getDate();
  let day = Math.min(baseDay, daysInMonth);
  let d = new Date(year, month-1, day);
  while(d.getDay()===0 || d.getDay()===6 || HOLIDAYS.has(dateStr(d.getFullYear(), d.getMonth()+1, d.getDate()))){
    d.setDate(d.getDate()-1);
  }
  return dateStr(d.getFullYear(), d.getMonth()+1, d.getDate());
}

// ── PIN 인증 ──
const PIN_KEY = 'wg_pin_v3';
let pinBuffer = '';
let pinMode = 'check'; // 'check' | 'setup1' | 'setup2'
let pin1Temp = '';

function simpleHash(s){
  let h=5381;
  for(let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i);
  return (h>>>0).toString(16);
}

function initAuth(){
  const stored = localStorage.getItem(PIN_KEY);
  if(!stored){
    pinMode='setup1';
    document.getElementById('lockSub').textContent='새 PIN 4자리를 입력해 주세요';
    document.getElementById('pinHint').textContent='처음 사용 시 PIN을 설정해요';
  } else {
    pinMode='check';
    document.getElementById('lockSub').textContent='PIN을 입력해 주세요';
  }
}

function pinInput(d){
  if(pinBuffer.length>=4) return;
  pinBuffer+=d;
  updateDots();
  if(pinBuffer.length===4) setTimeout(handlePin, 120);
}

function pinDelete(){
  pinBuffer=pinBuffer.slice(0,-1);
  updateDots();
  document.getElementById('pinErr').textContent='';
}

function updateDots(){
  for(let i=0;i<4;i++)
    document.getElementById('d'+i).classList.toggle('filled', i<pinBuffer.length);
}

function handlePin(){
  if(pinMode==='setup1'){
    pin1Temp=pinBuffer; pinBuffer='';
    updateDots();
    pinMode='setup2';
    document.getElementById('lockSub').textContent='한 번 더 입력해 주세요';
    document.getElementById('pinHint').textContent='';
  } else if(pinMode==='setup2'){
    if(pinBuffer===pin1Temp){
      localStorage.setItem(PIN_KEY, simpleHash(pinBuffer));
      pinBuffer=''; updateDots();
      unlock();
    } else {
      document.getElementById('pinErr').textContent='PIN이 일치하지 않아요. 다시 설정해 주세요.';
      pinBuffer=''; pin1Temp=''; updateDots();
      pinMode='setup1';
      document.getElementById('lockSub').textContent='새 PIN 4자리를 입력해 주세요';
    }
  } else {
    if(simpleHash(pinBuffer)===localStorage.getItem(PIN_KEY)){
      pinBuffer=''; updateDots();
      unlock();
    } else {
      document.getElementById('pinErr').textContent='PIN이 틀렸어요. 다시 입력해 주세요.';
      pinBuffer=''; updateDots();
    }
  }
}

function unlock(){
  document.getElementById('lockScreen').classList.add('hidden');

}

document.addEventListener('visibilitychange',()=>{

// ── 가계부 데이터 ──
const SUBS={
  income:['주수입','부수입','이자·배당','기타'],
  fixed:['주거비','통신비','보험료','구독료','대출이자','기타'],
  variable:['식비','외식·배달','교통','주유','쇼핑','경조사','의료','기타'],
  saving:['정기적금','예금','주식·펀드','청약','연금','기타'],
  debt:['주택대출','신용대출','학자금','카드할부','기타']
};
const ICONS={income:'💵',fixed:'🏠',variable:'🛒',saving:'💙',debt:'💳'};
const AMTCOL={income:'var(--income)',fixed:'var(--saving)',variable:'var(--text)',saving:'var(--saving)',debt:'var(--expense)'};
const BGCOL={income:'var(--income-bg)',fixed:'var(--saving-bg)',variable:'#fdf6e8',saving:'#f0eeff',debt:'var(--debt-bg)'};
const BARCOL={income:'#1D9E75',fixed:'#378ADD',variable:'#EF9F27',saving:'#7F77DD',debt:'#E24B4A'};

let curMonth=new Date().getMonth(), curYear=new Date().getFullYear(), curTab='all';
let selectedCat='income', selectedSub='주수입';

function loadEntries(){ try{return JSON.parse(localStorage.getItem('wg_entries')||'[]');}catch(e){return[];} }
function saveEntries(arr){ try{localStorage.setItem('wg_entries',JSON.stringify(arr));}catch(e){} }
let entries=loadEntries();

function fmt(n){
  const sign=n<0?'-':'';
  const a=Math.abs(Math.round(n));
  if(a>=100000000) return sign+'₩'+(a/100000000).toFixed(1)+'억';
  if(a>=10000) return sign+'₩'+(a/10000).toFixed(1)+'만';
  return sign+'₩'+a.toLocaleString('ko-KR');
}
function fmtFull(n){
  const sign=n<0?'-':'';
  return sign+'₩'+Math.abs(Math.round(n)).toLocaleString('ko-KR');
}

// ── 급여일 배너 ──
function renderSalaryBanner(){
  const today = new Date();
  const ty=today.getFullYear(), tm=today.getMonth()+1, td=today.getDate();
  const todayStr=dateStr(ty,tm,td);

  // 이번달/다음달 급여일 계산
  function salaryInfo(year,month){
    return {
      tae: getPayDate(year, month, 25),
      seo: getPayDate(year, month, 21)
    };
  }

  const thisM=salaryInfo(ty,tm);
  const nextM=salaryInfo(tm===12?ty+1:ty, tm===12?1:tm+1);

  function label(payStr, name, salary){
    const d=new Date(payStr+'T00:00:00');
    const dayDiff=Math.round((d-today)/(1000*60*60*24));
    const dayNames=['일','월','화','수','목','금','토'];
    const past=payStr<todayStr;
    const txt=past
      ? `${name} 지급완료 (${payStr.slice(5).replace('-','/')})`
      : dayDiff===0 ? `${name} 오늘 💸`
      : `${name} D-${dayDiff} (${payStr.slice(5).replace('-','/')} ${dayNames[d.getDay()]})`;
    return `<div class="salary-item${past?' past':''}"><span class="dot"></span><span>${txt}</span></div>`;
  }

  let html='';
  // 이번달 급여가 이미 지났으면 다음달 표시, 아니면 이번달
  const taeDate = thisM.tae < todayStr ? nextM.tae : thisM.tae;
  const seoDate = thisM.seo < todayStr ? nextM.seo : thisM.seo;
  html+=label(taeDate,'태우 월급');
  html+=label(seoDate,'소헌 월급');
  document.getElementById('salaryBanner').innerHTML=html;
}

// ── 예산 ──
function loadBudget(){ try{return JSON.parse(localStorage.getItem('wg_budget')||'{"variable":0,"saving":0}');}catch(e){return{variable:0,saving:0};} }
function saveBudgetData(b){ localStorage.setItem('wg_budget',JSON.stringify(b)); }

function openBudgetModal(){
  const b=loadBudget();
  document.getElementById('bVariable').value=b.variable||'';
  document.getElementById('bSaving').value=b.saving||'';
  document.getElementById('budgetModal').classList.add('open');
}
function closeBudgetModal(){ document.getElementById('budgetModal').classList.remove('open'); }
function saveBudget(){
  saveBudgetData({
    variable:parseInt(document.getElementById('bVariable').value)||0,
    saving:parseInt(document.getElementById('bSaving').value)||0
  });
  closeBudgetModal(); render();
}

function renderBudgetSection(me){
  const b=loadBudget();
  if(!b.variable && !b.saving){ 
    document.getElementById('budgetSection').innerHTML=
      `<div style="text-align:center;padding:6px 0"><button class="budget-set-btn" style="color:var(--text3);font-size:12px;background:none;border:none;cursor:pointer;text-decoration:underline" onclick="openBudgetModal()">📊 월 예산 설정하기</button></div>`;
    return;
  }
  const varSpent=me.filter(e=>e.cat==='variable').reduce((a,b)=>a+b.amount,0);
  const saveDone=me.filter(e=>e.cat==='saving').reduce((a,b)=>a+b.amount,0);
  function pct(v,max){ return max>0?Math.min(Math.round(v/max*100),100):0; }
  function color(p){ return p>=100?'#E24B4A':p>=80?'#EF9F27':'#1D9E75'; }
  const vp=pct(varSpent,b.variable), sp=pct(saveDone,b.saving);
  document.getElementById('budgetSection').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:11px;color:var(--text2);font-weight:600">📊 예산 현황</span>
      <button style="background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;text-decoration:underline" onclick="openBudgetModal()">설정</button>
    </div>
    ${b.variable?`<div class="budget-row"><div class="budget-lbl">변동지출</div><div class="budget-track"><div class="budget-fill" style="width:${vp}%;background:${color(vp)}"></div></div><div class="budget-pct" style="color:${color(vp)}">${vp}%</div></div>`:''}
    ${b.saving?`<div class="budget-row"><div class="budget-lbl">저축목표</div><div class="budget-track"><div class="budget-fill" style="width:${sp}%;background:#7F77DD"></div></div><div class="budget-pct" style="color:#7F77DD">${sp}%</div></div>`:''}
  `;
}

// ── 메인 렌더 ──
function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
}

function monthEntries(){
  // 이번달 항목 + 전달 수입 항목도 포함 (급여가 전달 날짜로 찍혀도 이번달에 표시)
  const prevMonth = curMonth===0 ? 11 : curMonth-1;
  const prevYear  = curMonth===0 ? curYear-1 : curYear;
  return entries.filter(e=>{
    const d=new Date(e.date+'T00:00:00');
    const em=d.getMonth(), ey=d.getFullYear();
    // 이번달 항목
    if(em===curMonth && ey===curYear) return true;
    // 전달 수입 항목 (급여 등)
    if(e.cat==='income' && em===prevMonth && ey===prevYear) return true;
    return false;
  });
}

function setTab(t,el){
  curTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function render(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('monthLabel').textContent=curYear+'년 '+months[curMonth];
  const me=monthEntries();
  const income=me.filter(e=>e.cat==='income').reduce((a,b)=>a+b.amount,0);
  const fixed=me.filter(e=>e.cat==='fixed').reduce((a,b)=>a+b.amount,0);
  const variable=me.filter(e=>e.cat==='variable').reduce((a,b)=>a+b.amount,0);
  const saving=me.filter(e=>e.cat==='saving').reduce((a,b)=>a+b.amount,0);
  const debt=me.filter(e=>e.cat==='debt').reduce((a,b)=>a+b.amount,0);
  const totalExp=fixed+variable+debt;
  const balance=income-totalExp-saving;

  document.getElementById('sIncome').textContent=fmt(income);
  document.getElementById('sExpense').textContent=fmt(totalExp);
  document.getElementById('sSaving').textContent=fmt(saving);
  const bEl=document.getElementById('sBalance');
  bEl.textContent=fmt(balance);
  bEl.style.color=balance>=0?'#6ee7c3':'#f9a8a8';

  const max=Math.max(income,totalExp,saving,1);
  document.getElementById('chartWrap').innerHTML=
    [['수입',income,'#1D9E75'],['고정',fixed,'#378ADD'],['변동',variable,'#EF9F27'],['저축',saving,'#7F77DD'],['부채',debt,'#E24B4A']]
    .map(([l,v,c])=>`<div class="bar-row"><div class="bar-lbl">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${c}"></div></div><div class="bar-amt">${fmt(v)}</div></div>`)
    .join('');

  renderBudgetSection(me);
  renderSalaryBanner();
  renderList();
}

function renderList(){
  const me=monthEntries();
  const filtered=(curTab==='all'?me:me.filter(e=>e.cat===curTab))
    .sort((a,b)=>new Date(b.date+'T00:00:00')-new Date(a.date+'T00:00:00'));
  const wrap=document.getElementById('listWrap');
  if(!filtered.length){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">아직 항목이 없어요<br>+ 버튼으로 추가해 보세요</div></div>';
    return;
  }
  const days=['일','월','화','수','목','금','토'];
  let html='', lastDate='';
  filtered.forEach(e=>{
    if(e.date!==lastDate){
      const d=new Date(e.date+'T00:00:00');
      html+=`<div class="date-group">${e.date.slice(5).replace('-','/')} (${days[d.getDay()]})</div>`;
      lastDate=e.date;
    }
    const neg=e.cat!=='income';
    html+=`<div class="entry">
      <div class="entry-icon" style="background:${BGCOL[e.cat]}">${ICONS[e.cat]}</div>
      <div class="entry-body">
        <div class="entry-name">${e.name}</div>
        <div class="entry-sub">${e.sub}${e.memo?' · '+e.memo:''}</div>
      </div>
      <div class="entry-right">
        <div class="entry-amt" style="color:${AMTCOL[e.cat]}">${neg?'- ':'+ '}${fmtFull(e.amount)}</div>
      </div>
      <button class="entry-del" onclick="delEntry('${e.id}')">×</button>
    </div>`;
  });
  wrap.innerHTML=html;
}

function delEntry(id){
  if(!confirm('이 항목을 삭제할까요?')) return;
  entries=entries.filter(e=>e.id!==id);
  saveEntries(entries); render();
}

function openSheet(){
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('fName').value='';
  document.getElementById('fAmount').value='';
  document.getElementById('fMemo').value='';
  selectCat('income',document.querySelector('.seg-income'));
  document.getElementById('sheetBg').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheetBg').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
function selectCat(cat,el){
  selectedCat=cat; selectedSub=SUBS[cat][0];
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  renderSubChips();
}
function renderSubChips(){
  document.getElementById('subChips').innerHTML=SUBS[selectedCat]
    .map(s=>`<button class="chip${s===selectedSub?' sel':''}" onclick="selectSub('${s}',this)">${s}</button>`).join('');
}
function selectSub(s,el){
  selectedSub=s;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}
function saveEntry(){
  const name=document.getElementById('fName').value.trim();
  const amount=parseFloat(document.getElementById('fAmount').value);
  const date=document.getElementById('fDate').value;
  if(!name){alert('항목명을 입력해 주세요.');return;}
  if(!amount||amount<=0){alert('금액을 입력해 주세요.');return;}
  if(!date){alert('날짜를 선택해 주세요.');return;}
  entries.push({
    id:Date.now()+'_'+Math.random().toString(36).slice(2),
    cat:selectedCat,sub:selectedSub,name,amount,date,
    memo:document.getElementById('fMemo').value.trim()
  });
  saveEntries(entries); closeSheet(); render();
}
